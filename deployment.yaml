apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask-devops-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: flask-devops
  template:
    metadata:
      labels:
        app: flask-devops
    spec:
      containers:
      - name: flask-container
        image: yourdockerhubusername/devops-app:latest
        ports:
        - containerPort: 5000
